name: KAGE OS CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install System & Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests pyyaml toml

    - name: Code Syntax Verification
      run: |
        python -m compileall core agents skills tests kage.py kage_cli.py

    - name: Run Automated Test Suite
      run: |
        python -m unittest discover -s tests
