name: Control Plane CI

# Phase 8 — quality gate for the optional Next.js control plane (control-plane/).
on:
  push:
    branches: [main, supervisor-discord]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: control-plane/package-lock.json
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
